<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apex Collective — Meta Ads Agency</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600;9..144,700&family=Space+Grotesk:wght@400;500;600&family=Noto+Nastaliq+Urdu:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0F1B18;
    --surface: #16241F;
    --surface-2: #1D2E28;
    --text: #F2EFE9;
    --muted: #8FA39B;
    --gold: #C9A227;
    --gold-soft: rgba(201,162,39,0.16);
    --teal: #4C8577;
    --line: rgba(242,239,233,0.10);
    --radius: 4px;
    --max: 1120px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{ background: var(--bg); color: var(--text); font-family:'Space Grotesk', sans-serif; line-height:1.6; overflow-x:hidden; }
  ::selection{ background: var(--gold-soft); color: var(--gold);}
  a{ color:inherit; text-decoration:none; }
  .ur{ font-family:'Noto Nastaliq Urdu', serif; direction:rtl; unicode-bidi:isolate; }
  img,svg{ display:block; max-width:100%; }
  .wrap{ max-width: var(--max); margin:0 auto; padding:0 32px; }
  a:focus-visible, button:focus-visible{ outline:2px solid var(--gold); outline-offset:3px; }

  .seam{ position:relative; height:1px; background:var(--line); overflow:visible; max-width:100%; }
  .seam::before{
    content:''; position:absolute; top:-1px; left:0; height:2px; width:0;
    background: repeating-linear-gradient(90deg, var(--gold) 0 10px, transparent 10px 18px);
    animation: stitch 1.6s ease forwards; animation-play-state:paused;
  }
  .seam.in-view::before{ animation-play-state:running; }
  @keyframes stitch{ to{ width:100%; } }

  header{ position:fixed; top:0; left:0; right:0; z-index:50; background:rgba(15,27,24,0.85); backdrop-filter:blur(10px); border-bottom:1px solid var(--line); }
  header .wrap{ display:flex; align-items:center; justify-content:space-between; height:72px; }
  .logo{ font-family:'Fraunces', serif; font-weight:600; font-size:20px; letter-spacing:0.02em; display:flex; align-items:baseline; gap:8px; }
  .logo .dot{ color:var(--gold); }
  nav{ display:flex; gap:32px; }
  nav a{ font-size:14px; color:var(--muted); transition:color .2s ease; position:relative; }
  nav a:hover{ color:var(--text); }
  nav a::after{ content:''; position:absolute; left:0; right:0; bottom:-6px; height:1px; background:var(--gold); transform:scaleX(0); transform-origin:left; transition:transform .25s ease; }
  nav a:hover::after{ transform:scaleX(1); }
  @media (max-width:780px){ nav{ display:none; } }

  .hero{ min-height:100svh; display:flex; align-items:center; padding-top:72px; position:relative; }
  .hero::before{ content:''; position:absolute; top:0; right:-10%; width:60%; height:100%; background:radial-gradient(ellipse at top right, rgba(76,133,119,0.25), transparent 60%); pointer-events:none; }
  .hero .wrap{ display:grid; grid-template-columns:1.3fr 1fr; gap:48px; align-items:center; }
  @media (max-width:860px){ .hero .wrap{ grid-template-columns:1fr; } }

  .eyebrow{ display:flex; align-items:center; gap:12px; font-size:13px; letter-spacing:0.12em; text-transform:uppercase; color:var(--gold); margin-bottom:22px; opacity:0; animation:rise .7s ease forwards; animation-delay:.05s; }
  .eyebrow::before{ content:''; width:28px; height:1px; background:var(--gold); }
  .eyebrow .ur{ color:var(--muted); font-size:16px; text-transform:none; letter-spacing:0; }

  h1.name{ font-family:'Fraunces', serif; font-weight:600; font-size:clamp(38px, 5.8vw, 68px); line-height:1.05; letter-spacing:-0.01em; margin-bottom:18px; opacity:0; animation:rise .8s ease forwards; animation-delay:.15s; }
  h1.name .ur{ display:block; font-size:0.56em; font-weight:700; color:var(--gold); margin-top:8px; }

  .tagline{ max-width:480px; color:var(--muted); font-size:17px; margin-bottom:10px; opacity:0; animation:rise .8s ease forwards; animation-delay:.28s; }
  .tagline.ur{ font-size:20px; color:var(--text); max-width:480px; margin-bottom:34px; opacity:0; animation:rise .8s ease forwards; animation-delay:.38s; }

  @keyframes rise{ from{ opacity:0; transform:translateY(14px);} to{ opacity:1; transform:translateY(0);} }

  .cta-row{ display:flex; gap:16px; flex-wrap:wrap; opacity:0; animation:rise .8s ease forwards; animation-delay:.5s; }
  .btn{ display:inline-flex; align-items:center; gap:10px; padding:14px 26px; border-radius:var(--radius); font-size:14px; font-weight:500; border:1px solid transparent; transition:all .2s ease; }
  .btn.primary{ background:var(--gold); color:#16241F; }
  .btn.primary:hover{ background:#ddb635; transform:translateY(-1px); }
  .btn.ghost{ border-color:var(--line); color:var(--text); }
  .btn.ghost:hover{ border-color:var(--gold); color:var(--gold); }
  .btn svg{ width:16px; height:16px; }

  .hero-card{ background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:32px; opacity:0; animation:rise .9s ease forwards; animation-delay:.35s; }
  .hero-card .row{ display:flex; justify-content:space-between; align-items:baseline; padding:14px 0; border-bottom:1px solid var(--line); }
  .hero-card .row:last-child{ border-bottom:none; }
  .hero-card .row .label{ color:var(--muted); font-size:13px; }
  .hero-card .row .value{ font-size:15px; text-align:right; }
  .hero-card .row .value.ur{ font-size:18px; }

  section{ padding:110px 0; position:relative; }
  .head-block{ margin-bottom:56px; max-width:640px; }
  .head-block .kicker{ font-size:13px; letter-spacing:0.12em; text-transform:uppercase; color:var(--gold); margin-bottom:14px; }
  .head-block h2{ font-family:'Fraunces', serif; font-weight:600; font-size:clamp(28px, 3.6vw, 42px); margin-bottom:10px; }
  .head-block .ur{ color:var(--muted); font-size:18px; }

  .about-grid{ display:grid; grid-template-columns:1fr 1fr; gap:48px; }
  @media (max-width:780px){ .about-grid{ grid-template-columns:1fr; } }
  .about-grid p{ color:var(--muted); margin-bottom:16px; font-size:15.5px; }
  .about-grid p.ur{ color:var(--text); font-size:19px; line-height:2; text-align:right; }

  .services{ display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--line); border:1px solid var(--line); }
  @media (max-width:780px){ .services{ grid-template-columns:1fr; } }
  .service{ background:var(--bg); padding:34px 28px; transition:background .25s ease; }
  .service:hover{ background:var(--surface); }
  .service .num{ font-family:'Fraunces', serif; color:var(--gold); font-size:14px; margin-bottom:18px; display:block; }
  .service h3{ font-size:18px; font-weight:600; margin-bottom:8px; }
  .service .ur{ color:var(--gold); font-size:15px; display:block; margin-bottom:12px; }
  .service p{ color:var(--muted); font-size:14.5px; }

  .pricing{ display:grid; grid-template-columns:repeat(3,1fr); gap:24px; }
  @media (max-width:900px){ .pricing{ grid-template-columns:1fr; } }
  .plan{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
    padding:36px 30px; display:flex; flex-direction:column; position:relative;
    transition:transform .25s ease, border-color .25s ease;
  }
  .plan:hover{ transform:translateY(-6px); border-color:rgba(201,162,39,0.4); }
  .plan.featured{ border-color:var(--gold); background:linear-gradient(180deg, rgba(201,162,39,0.08), var(--surface) 40%); }
  .plan .tag{ position:absolute; top:-13px; right:30px; background:var(--gold); color:#16241F; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; padding:5px 12px; border-radius:2px; font-weight:600; }
  .plan .tier{ font-size:13px; letter-spacing:0.1em; text-transform:uppercase; color:var(--gold); margin-bottom:14px; }
  .plan .tier-ur{ color:var(--muted); font-size:16px; margin-bottom:18px; display:block; }
  .plan .price{ font-family:'Fraunces', serif; font-size:40px; font-weight:600; margin-bottom:4px; }
  .plan .price span{ font-size:15px; color:var(--muted); font-weight:400; font-family:'Space Grotesk', sans-serif; }
  .plan .price-ur{ color:var(--muted); font-size:15px; margin-bottom:26px; }
  .plan ul{ list-style:none; margin-bottom:30px; flex-grow:1; }
  .plan li{ display:flex; gap:10px; padding:10px 0; border-top:1px solid var(--line); font-size:14.5px; color:var(--text); }
  .plan li:first-child{ border-top:none; }
  .plan li .en{ flex:1; }
  .plan li .check{ color:var(--gold); flex-shrink:0; }
  .plan li .ur-item{ display:block; color:var(--muted); font-size:14px; margin-top:2px; }
  .plan .btn{ justify-content:center; width:100%; }

  .contact-box{ background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:56px; display:grid; grid-template-columns:1fr auto; align-items:center; gap:32px; }
  @media (max-width:780px){ .contact-box{ grid-template-columns:1fr; text-align:center; } }
  .contact-box h2{ font-family:'Fraunces', serif; font-size:clamp(26px, 3.4vw, 38px); margin-bottom:8px; }
  .contact-box .ur{ color:var(--gold); font-size:19px; margin-bottom:6px; }
  .contact-box .phone{ color:var(--muted); font-size:14px; margin-top:10px; }

  footer{ border-top:1px solid var(--line); padding:32px 0; }
  footer .wrap{ display:flex; justify-content:space-between; align-items:center; color:var(--muted); font-size:13px; }
  footer .socials{ display:flex; gap:20px; }
  footer .socials a:hover{ color:var(--gold); }
  @media (max-width:600px){ footer .wrap{ flex-direction:column; gap:14px; text-align:center; } }

  .reveal{ opacity:0; transform:translateY(24px); transition:opacity .7s ease, transform .7s ease; }
  .reveal.in-view{ opacity:1; transform:translateY(0); }

  .whatsapp-float{
    position:fixed; bottom:26px; right:26px; z-index:60;
    width:58px; height:58px; border-radius:50%;
    background:var(--gold); display:flex; align-items:center; justify-content:center;
    box-shadow:0 6px 20px rgba(0,0,0,0.4);
    transition:transform .2s ease;
  }
  .whatsapp-float:hover{ transform:scale(1.08); }
  .whatsapp-float svg{ width:28px; height:28px; }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important; scroll-behavior:auto !important; }
  }
</style>
</head>
